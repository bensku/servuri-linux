# Entry config for the UEFI removable/default path: \EFI\BOOT\BOOTX64.EFI.
#
# On this image BOOTX64.EFI is grub itself (NOT shim): openSUSE shim 16.x
# reset-loops on the OVMF/QEMU firmware we target and Secure Boot is unused, so
# booting shim from the removable path hangs the machine in an endless reset.
search --no-floppy --set=esp --file /EFI/opensuse/grub.cfg
if [ -f ($esp)/EFI/opensuse/bootuuid.cfg ]; then
  source ($esp)/EFI/opensuse/bootuuid.cfg
fi
if [ -n "${BOOT_UUID}" ]; then
  search --fs-uuid "${BOOT_UUID}" --set prefix --no-floppy
else
  search --label boot --set prefix --no-floppy
fi
if [ -d ($prefix)/grub2 ]; then
  set prefix=($prefix)/grub2
  configfile $prefix/grub.cfg
else
  set prefix=($prefix)/boot/grub2
  configfile $prefix/grub.cfg
fi
boot
